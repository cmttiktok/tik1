<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÈO CONTROL PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --bg: #fff0f3; --panel: #ffffff; --green: #2ecc71; }
        
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; gap: 15px; min-height: 100vh; box-sizing: border-box; }
        
        .left-col { width: 300px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .right-col { flex: 1; display: flex; flex-direction: column; background: var(--panel); border-radius: 25px; border: 2px solid #fff; overflow: hidden; padding: 20px; box-shadow: 0 8px 20px rgba(254, 44, 85, 0.05); }
        .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 2px solid #fff; box-shadow: 0 8px 20px rgba(254, 44, 85, 0.05); }
        
        /* ĐỒNG HỒ DECOR */
        .clock-box { text-align: center; font-size: 24px; font-weight: 700; color: var(--pink); background: #fff; border-radius: 15px; padding: 10px; margin-bottom: 10px; border: 2px dashed #ffdae0; }
        .clock-date { font-size: 12px; color: #888; display: block; }

        /* Ô CHAT */
        #chat { height: 500px; overflow-y: auto; display: flex; flex-direction: column-reverse; background: #fafafa; border-radius: 15px; padding: 10px; border: 1px solid #fff5f7; }
        .msg { padding: 10px; border-bottom: 1px solid #eee; font-size: 15px; line-height: 1.4; }
        
        /* MÀU SẮC CMT */
        .user-name { color: var(--pink); font-weight: bold; }
        .system-name { color: var(--green); font-weight: bold; }

        /* UI ELEMENTS */
        input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ffdae0; outline: none; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button.conn-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        .sw-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; font-weight: bold; color: #4a1c2c; }
        .switch { position: relative; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ddd; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--pink); }
        input:checked + .slider:before { transform: translateX(18px); }

        input[type="range"] { width: 100%; accent-color: var(--pink); margin-top: 5px; }
        .admin-link { display: block; text-align: center; margin-top: 15px; color: var(--pink); text-decoration: none; font-size: 13px; font-weight: bold; }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .left-col { width: 100%; }
            .right-col { width: 100%; margin-top: 10px; height: auto; padding: 15px; }
            #chat { height: 400px; }
        }
    </style>
</head>
<body>
    <div class="left-col">
        <div class="clock-box">
            <span id="digital-clock">00:00:00</span>
            <span class="clock-date" id="digital-date">17 tháng 04, 2026</span>
        </div>

        <div class="card">
            <input type="text" id="user" placeholder="Nhập ID TikTok...">
            <button class="conn-btn" onclick="start()">KẾT NỐI LIVE</button>
            <p id="stt" style="font-size:12px; color:gray; margin-top:10px; text-align:center">Chưa kết nối</p>
        </div>

        <div class="card">
            <div class="sw-item" style="background: #fff5f7; border-radius: 10px; padding: 10px;">
                <span>🔇 TẮT TIẾNG ĐỌC</span>
                <label class="switch"><input type="checkbox" id="muteToggle"><span class="slider"></span></label>
            </div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
            
            <div class="sw-item">Chào mừng <label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Tặng quà <label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Kêu gọi PK <label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Auto trả lời <label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item" style="color:var(--pink)">CHỈ ĐỌC PK <label class="switch"><input type="checkbox" id="pkOnly"><span class="slider"></span></label></div>
            
            <div style="margin-top: 10px; font-size: 12px;">
                Tốc độ đọc: <span id="speedVal">1.0</span>x
                <input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('speedVal').innerText=this.value">
            </div>
            <a href="/admin" class="admin-link">CÀI ĐẶT HỆ THỐNG ⚙️</a>
        </div>
    </div>

    <div class="right-col">
        <h3 style="margin:0 0 10px 0; color:#333; font-size:16px">Lịch sử hoạt động</h3>
        <div id="chat"></div>
    </div>

    <script>
        const socket = io();
        let queue = [];
        let playing = false;

        // ĐỒNG HỒ
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('vi-VN', { hour12: false });
            const dateStr = now.toLocaleDateString('vi-VN', { day: '2-digit', month: 'long', year: 'numeric' });
            document.getElementById('digital-clock').innerText = timeStr;
            document.getElementById('digital-date').innerText = dateStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function start() {
            const u = document.getElementById('user').value;
            if(u) {
                socket.emit('set-username', u);
                document.getElementById('stt').innerText = "Đang kết nối...";
            } else {
                alert("Hãy nhập ID TikTok");
            }
        }

        socket.on('status', m => document.getElementById('stt').innerText = m);

        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div'); div.className = 'msg';
            
            // THAY ĐỔI MÀU SẮC THEO LOẠI
            const isSystem = ['welcome', 'gift', 'pk', 'bot'].includes(d.type) || d.user === "Hệ thống" || d.user === "QUÀ" || d.user === "HỆ THỐNG";
            const labelClass = isSystem ? 'system-name' : 'user-name';
            
            div.innerHTML = `<b class="${labelClass}">${d.user}:</b> ${d.comment}`;
            chat.prepend(div);

            // KIỂM TRA NÚT MUTE TRƯỚC KHI CHO VÀO HÀNG ĐỢI
            const isMuted = document.getElementById('muteToggle').checked;

            if (d.audio && !isMuted) {
                const pkOnly = document.getElementById('pkOnly').checked;
                if (pkOnly) {
                    if (d.type === 'pk' && document.getElementById('pkToggle').checked) queue.push(d.audio);
                } else {
                    if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                    if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                    if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                    if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                    queue.push(d.audio);
                }
                if (!playing) play();
            }
        });

        function play() {
            // Nếu lỡ đang chơi mà bấm Mute, xóa hàng đợi
            if (document.getElementById('muteToggle').checked) {
                queue = [];
                playing = false;
                return;
            }

            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = parseFloat(document.getElementById('speechSpeed').value);
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
