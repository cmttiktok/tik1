<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BÈO CONTROL PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --bg: #fff0f3; --panel: #ffffff; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--panel); padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* Đồng hồ & Chạy chữ */
        .header { text-align: center; }
        #digital-clock { font-size: 40px; color: var(--pink); font-weight: 700; }
        .date-row { display: flex; justify-content: center; gap: 20px; font-size: 13px; margin: 10px 0; font-weight: bold; }
        .marquee-box { background: #333; color: #fbff00; padding: 5px; border-radius: 10px; font-size: 12px; }

        /* Khung Lịch sử - Cố định chiều cao, có thanh cuộn */
        .chat-box { height: 400px; overflow-y: auto; background: white; border-radius: 15px; padding: 10px; display: flex; flex-direction: column-reverse; border: 1px solid #eee; }
        .msg { padding: 8px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }

        /* Nút trượt hồng */
        .sw-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; font-weight: bold; }
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--pink); }
        input:checked + .slider:before { transform: translateX(18px); }
        
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card header">
            <div id="digital-clock">00:00:00</div>
            <div class="date-row">
                <span id="digital-date">--/--/----</span>
                <span id="lunar-date" style="color:#8e44ad">--/-- Âm Lịch</span>
            </div>
            <div class="marquee-box"><marquee id="marquee-text">Chào mừng Bèo!</marquee></div>
        </div>

        <div class="card">
            <input type="text" id="user" placeholder="ID TikTok...">
            <button onclick="start()">KẾT NỐI</button>
        </div>

        <div class="card">
            <div class="sw-item">Chào khách <label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Đọc quà <label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Trợ lý <label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            <a href="/admin" target="_blank" style="display:block; text-align:center; margin-top:15px; color:var(--pink); text-decoration:none; font-weight:bold;">⚙️ CÀI ĐẶT HỆ THỐNG</a>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Lịch sử hoạt động</h3>
            <div id="chat" class="chat-box"></div>
        </div>
    </div>
    <script>
        // JS logic xử lý socket, âm thanh, đồng hồ và lấy thông báo từ /api/announcement
    </script>
</body>
</html>
