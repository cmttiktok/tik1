<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÈO CONTROL PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --bg: #fff0f3; --panel: #ffffff; --green: #2ecc71; --border: #f0f0f0; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; gap: 15px; height: 100vh; box-sizing: border-box; overflow: hidden; }
        
        .left-col { width: 320px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .card { background: var(--panel); padding: 15px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
        
        .header-decor { background: white; padding: 15px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        #digital-clock { font-size: 32px; font-weight: 700; color: var(--pink); line-height: 1; }
        .date-row { display: flex; justify-content: space-between; font-size: 11px; margin-top: 8px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .marquee-box { background: #333; color: #fbff00; font-size: 11px; padding: 4px 0; margin-top: 8px; border-radius: 8px; font-weight: bold; }
        
        .follow-section { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; background: #fff5f7; padding: 10px; border-radius: 12px; }
        #follow-count { font-size: 24px; font-weight: 700; color: #333; }

        .right-col { flex: 1; display: flex; flex-direction: column; background: var(--panel); border-radius: 25px; border: 1px solid var(--border); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); height: calc(100vh - 30px); }
        #chat { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; background: #ffffff; border-radius: 15px; padding: 10px; border: 1px solid #f9f9f9; }
        .hide-system .msg-system { display: none !important; }
        .msg { padding: 10px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        
        .sw-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; font-weight: bold; }
        .switch { position: relative; width: 38px; height: 20px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ddd; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--pink); }
        input:checked + .slider:before { transform: translateX(18px); }

        input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ffdae0; outline: none; margin-bottom: 8px; box-sizing: border-box; }
        button.conn-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        input[type="range"] { width:100%; accent-color: var(--pink); cursor: pointer; }
    </style>
</head>
<body>
    <div class="left-col">
        <div class="header-decor">
            <div id="digital-clock">00:00:00</div>
            <div class="date-row">
                <span id="digital-date" style="font-weight: 700;">--/--/----</span>
                <span id="lunar-date" style="color:#8e44ad; font-weight: 700;">--/-- Âm Lịch</span>
            </div>
            <div class="marquee-box">
                <marquee id="marquee-text" behavior="scroll" direction="left">Chào mừng bạn!</marquee>
            </div>
            <div class="follow-section">
                <span style="font-size: 10px; font-weight: 700; color: var(--pink);">FOLLOWERS</span>
                <span id="follow-count">0</span>
            </div>
        </div>

        <div class="card">
            <input type="text" id="user" placeholder="Nhập ID TikTok...">
            <button class="conn-btn" onclick="start()">KẾT NỐI LIVE</button>
            <p id="stt" style="font-size:11px; color:gray; text-align:center; margin-top:5px">Sẵn sàng</p>
        </div>

        <div class="card">
            <div class="sw-item" style="color:#2980b9">ẨN CMT HỆ THỐNG <label class="switch"><input type="checkbox" onchange="document.getElementById('chat').classList.toggle('hide-system', this.checked)"><span class="slider"></span></label></div>
            <div class="sw-item" style="color:var(--pink)">CHỈ NHẮC PK <label class="switch"><input type="checkbox" id="pkOnly"><span class="slider"></span></label></div>
            <div class="sw-item">Chào khách <label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Đọc quà <label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Nhắc PK <label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Trợ lý <label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Tắt tiếng <label class="switch"><input type="checkbox" id="muteToggle"><span class="slider"></span></label></div>
            <div style="margin-top: 10px;">
                <span style="font-size: 12px; font-weight: bold;">TỐC ĐỘ: <b id="speedVal" style="color:var(--pink)">1.0</b>x</span>
                <input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('speedVal').innerText=this.value">
            </div>
            <a href="/admin" target="_blank" style="display:block; text-align:center; margin-top:12px; font-size:12px; color:var(--pink); text-decoration:none; font-weight:bold;">⚙️ CÀI ĐẶT HỆ THỐNG</a>
        </div>
    </div>

    <div class="right-col">
        <h3 style="margin:0 0 10px 0; font-size:16px; font-weight: 700;">Lịch sử hoạt động</h3>
        <div id="chat"></div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false;
        const noSleep = new NoSleep();

        async function updateAnn() {
            try {
                const res = await fetch('/api/announcement');
                const data = await res.json();
                if(data.content) document.getElementById('marquee-text').innerText = data.content;
            } catch (e) {}
        }
        updateAnn(); setInterval(updateAnn, 30000);

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('vi-VN', { hour12: false });
            document.getElementById('digital-date').innerText = now.toLocaleDateString('vi-VN');
            const dayMap = { 17: "01", 18: "02", 19: "03", 20: "04" };
            document.getElementById('lunar-date').innerText = `${dayMap[now.getDate()] || now.getDate()}/03 Âm Lịch`;
        }
        setInterval(updateClock, 1000); updateClock();

        function start() {
            const u = document.getElementById('user').value;
            if(u) { socket.emit('set-username', u); document.getElementById('stt').innerText = "Đang kết nối..."; noSleep.enable(); }
        }

        socket.on('room-info', data => {
            if(data.followerCount) document.getElementById('follow-count').innerText = data.followerCount.toLocaleString();
        });

        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            const isSys = ['welcome','gift','pk','bot'].includes(d.type) || ["Hệ thống","QUÀ","TRỢ LÝ"].includes(d.user);
            div.className = `msg ${isSys ? 'msg-system' : ''}`;
            div.innerHTML = `<b style="color:${isSys?'#2ecc71':'#fe2c55'}">${d.user}:</b> ${d.comment}`;
            chat.prepend(div);

            if (d.audio && !document.getElementById('muteToggle').checked) {
                if (document.getElementById('pkOnly').checked) {
                    if (d.type === 'pk' && document.getElementById('pkToggle').checked) queue.push(d.audio);
                } else {
                    if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                    if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                    if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                    if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                    queue.push(d.audio);
                }
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length || document.getElementById('muteToggle').checked) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = parseFloat(document.getElementById('speechSpeed').value);
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
