<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÈO CONTROL PANEL - PREMIUM</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/nguyenhuuhiep/AmLichJS/amlich.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --bg: #fff0f3; --panel: #ffffff; --green: #2ecc71; --border: #f0f0f0; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; gap: 15px; min-height: 100vh; box-sizing: border-box; }
        .left-col { width: 320px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; }
        .right-col { flex: 1; display: flex; flex-direction: column; background: var(--panel); border-radius: 25px; border: 1px solid var(--border); overflow: hidden; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .card { background: var(--panel); padding: 20px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
        .header-decor { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .clock-section { text-align: left; }
        #digital-clock { font-size: 28px; font-weight: 700; color: var(--pink); line-height: 1; }
        .date-box { font-size: 11px; color: #666; margin-top: 5px; line-height: 1.4; }
        .lunar-date { color: #8e44ad; font-weight: bold; }
        .follow-section { text-align: right; background: #fff5f7; padding: 8px 15px; border-radius: 15px; border: 1px solid #ffdae0; }
        .follow-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--pink); font-weight: 700; }
        #follow-count { font-size: 24px; font-weight: 700; color: #333; display: block; }
        #chat { height: 500px; overflow-y: auto; display: flex; flex-direction: column-reverse; background: #ffffff; border-radius: 20px; padding: 10px; border: 1px solid #eeeeee; }
        .msg { padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 15px; }
        .user-name { color: var(--pink); font-weight: bold; }
        .system-name { color: var(--green); font-weight: bold; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ffdae0; outline: none; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button.conn-btn { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .sw-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 13px; font-weight: bold; color: #4a1c2c; }
        .switch { position: relative; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ddd; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--pink); }
        input:checked + .slider:before { transform: translateX(18px); }
        .admin-link { display: block; text-align: center; margin-top: 15px; color: var(--pink); text-decoration: none; font-size: 13px; font-weight: bold; }
        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .left-col { width: 100%; }
            #chat { height: 400px; }
        }
    </style>
</head>
<body>
    <div class="left-col">
        <div class="header-decor">
            <div class="clock-section">
                <div id="digital-clock">00:00:00</div>
                <div class="date-box">
                    <span id="digital-date">--/--/----</span><br>
                    <span class="lunar-date" id="lunar-date">Âm lịch: Đang tính...</span>
                </div>
            </div>
            <div class="follow-section">
                <span class="follow-label">Followers</span>
                <span id="follow-count">0</span>
            </div>
        </div>

        <div class="card">
            <input type="text" id="user" placeholder="Nhập ID TikTok...">
            <button class="conn-btn" onclick="start()">KẾT NỐI LIVE</button>
            <p id="stt" style="font-size:12px; color:gray; margin-top:10px; text-align:center">Chưa kết nối</p>
        </div>

        <div class="card">
            <div class="sw-item">🔇 TẮT TIẾNG ĐỌC <label class="switch"><input type="checkbox" id="muteToggle"><span class="slider"></span></label></div>
            <div class="sw-item">Chào mừng <label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Tặng quà <label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Kêu gọi PK <label class="switch"><input type="checkbox" id="pkToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Auto trả lời <label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item" style="color:var(--pink)">CHỈ ĐỌC PK <label class="switch"><input type="checkbox" id="pkOnly"><span class="slider"></span></label></div>
            <div style="margin-top: 10px; font-size: 12px;">
                Tốc độ đọc: <span id="speedVal">1.0</span>x
                <input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('speedVal').innerText=this.value">
            </div>
            <a href="/admin" class="admin-link">CÀI ĐẶT HỆ THỐNG ⚙️</a>
        </div>
    </div>

    <div class="right-col">
        <h3 style="margin:0 0 15px 0; color:#333; font-size:16px; font-weight: 700;">Lịch sử hoạt động</h3>
        <div id="chat"></div>
    </div>

    <script>
        const socket = io();
        let queue = [];
        let playing = false;

        // TÍNH LỊCH ÂM CHUẨN
        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString('vi-VN', { hour12: false });
            document.getElementById('digital-date').innerText = now.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
            
            // Gọi hàm từ amlich.js
            const d = now.getDate();
            const m = now.getMonth() + 1;
            const y = now.getFullYear();
            const lunar = getLunarDate(d, m, y); // getLunarDate là hàm từ thư viện amlich.js
            document.getElementById('lunar-date').innerText = `Âm lịch: ${lunar[0]}/${lunar[1]} (${lunar[3]})`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function start() {
            const u = document.getElementById('user').value;
            if(u) {
                socket.emit('set-username', u);
                document.getElementById('stt').innerText = "Đang kết nối...";
            }
        }

        socket.on('room-info', data => {
            if(data.followerCount) document.getElementById('follow-count').innerText = data.followerCount.toLocaleString();
        });

        socket.on('status', m => document.getElementById('stt').innerText = m);

        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div'); div.className = 'msg';
            const isSystem = ['welcome', 'gift', 'pk', 'bot'].includes(d.type) || ["Hệ thống", "QUÀ", "HỆ THỐNG"].includes(d.user);
            const labelClass = isSystem ? 'system-name' : 'user-name';
            div.innerHTML = `<b class="${labelClass}">${d.user}:</b> ${d.comment}`;
            chat.prepend(div);

            if (d.audio && !document.getElementById('muteToggle').checked) {
                const pkOnly = document.getElementById('pkOnly').checked;
                if (pkOnly) {
                    if (d.type === 'pk' && document.getElementById('pkToggle').checked) queue.push(d.audio);
                } else {
                    if (d.type === 'welcome' && !document.getElementById('welcomeToggle').checked) return;
                    if (d.type === 'gift' && !document.getElementById('giftToggle').checked) return;
                    if (d.type === 'pk' && !document.getElementById('pkToggle').checked) return;
                    if (d.type === 'bot' && !document.getElementById('botToggle').checked) return;
                    queue.push(d.audio);
                }
                if (!playing) play();
            }
        });

        function play() {
            if (document.getElementById('muteToggle').checked) { queue = []; playing = false; return; }
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = parseFloat(document.getElementById('speechSpeed').value);
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
