<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BÈO CONTROL PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --bg: #fff0f3; --panel: #ffffff; --border: #f0f0f0; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; gap: 15px; }
        .left-col { width: 320px; display: flex; flex-direction: column; gap: 10px; }
        .right-col { flex: 1; background: var(--panel); border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .card { background: var(--panel); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        
        /* Avatar & Clock */
        .header-decor { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        #digital-clock { font-size: 24px; font-weight: 700; color: var(--pink); }
        .avatar-box { text-align: center; }
        #host-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--pink); background: #ddd; }
        
        /* Chữ chạy */
        .marquee-box { overflow: hidden; white-space: nowrap; background: #fff; padding: 5px; border-radius: 10px; border: 1px solid var(--border); margin: 5px 0; }
        .marquee-text { display: inline-block; animation: marquee 15s linear infinite; font-weight: bold; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .rainbow { background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; color: transparent; }

        /* Nút gạt (Switch) */
        .sw-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: bold; }
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--pink); }
        input:checked + .slider:before { transform: translateX(20px); }

        #chat { height: 500px; overflow-y: auto; display: flex; flex-direction: column-reverse; }
        .msg { padding: 8px; border-bottom: 1px solid #f9f9f9; }
        input[type="text"] { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--pink); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="left-col">
        <div class="card">
            <div class="header-decor">
                <div>
                    <div id="digital-clock">00:00:00</div>
                    <div style="font-size: 10px;">17/4/2026 | Âm: 01/03</div>
                </div>
                <div class="avatar-box">
                    <img id="host-avatar" src="">
                    <div id="host-name" style="font-size: 10px; font-weight: bold;">Chưa kết nối</div>
                </div>
            </div>
            <div class="marquee-box">
                <div id="ann-display" class="marquee-text">Đang tải thông báo...</div>
            </div>
        </div>

        <div class="card">
            <input type="text" id="user" placeholder="ID TikTok...">
            <button onclick="start()">KẾT NỐI LIVE</button>
            <p id="stt" style="font-size:10px; text-align:center; color:gray;">Sẵn sàng</p>
        </div>

        <div class="card">
            <div class="sw-item">Chào khách <label class="switch"><input type="checkbox" id="welcomeToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Đọc quà <label class="switch"><input type="checkbox" id="giftToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Trợ lý <label class="switch"><input type="checkbox" id="botToggle" checked><span class="slider"></span></label></div>
            <div class="sw-item">Tắt tiếng <label class="switch"><input type="checkbox" id="muteToggle"><span class="slider"></span></label></div>
            <a href="/admin" style="display:block; text-align:center; font-size:11px; color:var(--pink); text-decoration:none; margin-top:10px;">⚙️ CÀI ĐẶT HỆ THỐNG</a>
        </div>
    </div>

    <div class="right-col">
        <h3 style="margin:0 0 10px 0;">Bình luận</h3>
        <div id="chat"></div>
    </div>

    <script>
        const socket = io();
        let queue = [], playing = false;

        function updateClock() {
            document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('vi-VN');
        }
        setInterval(updateClock, 1000);

        async function loadAnn() {
            const res = await fetch('/api/announcement');
            const data = await res.json();
            const el = document.getElementById('ann-display');
            el.innerText = data.text;
            if(data.isRainbow) el.classList.add('rainbow');
            else el.style.color = data.color;
        }
        loadAnn();

        function start() {
            const u = document.getElementById('user').value;
            if(u) socket.emit('set-username', u);
        }

        socket.on('room-info', d => {
            document.getElementById('host-avatar').src = d.avatar;
            document.getElementById('host-name').innerText = d.nickname;
        });

        socket.on('status', m => document.getElementById('stt').innerText = m);

        socket.on('audio-data', d => {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b style="color:var(--pink)">${d.user}:</b> ${d.comment}`;
            document.getElementById('chat').prepend(div);
            if (d.audio && !document.getElementById('muteToggle').checked) {
                queue.push(d.audio); if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.onended = () => setTimeout(play, 300);
            a.play();
        }
    </script>
</body>
</html>
