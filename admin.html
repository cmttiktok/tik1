<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BÈO ADMIN - QUẢN LÝ DỮ LIỆU</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff0f3; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #eee; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .active { background: #fe2c55; color: white; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .del { color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="load()">
    <div class="container">
        <h3 style="text-align: center; color: #fe2c55;">QUẢN LÝ DỮ LIỆU</h3>
        <div class="tabs">
            <div class="tab active" onclick="show('ban')">TỪ CẤM</div>
            <div class="tab" onclick="show('acr')">VIẾT TẮT</div>
            <div class="tab" onclick="show('emo')">EMOJI</div>
            <div class="tab" onclick="show('bot')">TRỢ LÝ</div>
        </div>

        <div id="ban" class="section">
            <input type="text" id="i-ban" placeholder="Từ cấm...">
            <button onclick="add('words', {word: document.getElementById('i-ban').value})">THÊM</button>
            <div id="l-ban"></div>
        </div>

        <div id="acr" class="section" style="display:none">
            <input type="text" id="i-acr-k" placeholder="Từ gốc (vd: k)">
            <input type="text" id="i-acr-v" placeholder="Đọc thành (vd: không)">
            <button onclick="add('acronyms', {key: document.getElementById('i-acr-k').value, value: document.getElementById('i-acr-v').value})">THÊM</button>
            <div id="l-acr"></div>
        </div>

        <div id="emo" class="section" style="display:none">
            <input type="text" id="i-emo-i" placeholder="Emoji (vd: ❤️)">
            <input type="text" id="i-emo-t" placeholder="Đọc thành (vd: tim)">
            <button onclick="add('emojis', {icon: document.getElementById('i-emo-i').value, text: document.getElementById('i-emo-t').value})">THÊM</button>
            <div id="l-emo"></div>
        </div>

        <div id="bot" class="section" style="display:none">
            <input type="text" id="i-bot-k" placeholder="Từ khóa">
            <input type="text" id="i-bot-v" placeholder="Câu trả lời">
            <button onclick="add('bot', {keyword: document.getElementById('i-bot-k').value, response: document.getElementById('i-bot-v').value})">THÊM</button>
            <div id="l-bot"></div>
        </div>
    </div>

    <script>
        function show(t) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(t).style.display = 'block';
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function load() {
            const b = await (await fetch('/api/words')).json();
            document.getElementById('l-ban').innerHTML = b.map(x => `<div class="item"><span>${x}</span><span class="del" onclick="del('words','${x}')">XOÁ</span></div>`).join('');
            const a = await (await fetch('/api/acronyms')).json();
            document.getElementById('l-acr').innerHTML = a.map(x => `<div class="item"><span>${x.key} ➜ ${x.value}</span><span class="del" onclick="del('acronyms','${x.key}')">XOÁ</span></div>`).join('');
            const e = await (await fetch('/api/emojis')).json();
            document.getElementById('l-emo').innerHTML = e.map(x => `<div class="item"><span>${x.icon} ➜ ${x.text}</span><span class="del" onclick="del('emojis','${x._id}')">XOÁ</span></div>`).join('');
            const o = await (await fetch('/api/bot')).json();
            document.getElementById('l-bot').innerHTML = o.map(x => `<div class="item"><span>${x.keyword}: ${x.response}</span><span class="del" onclick="del('bot','${x._id}')">XOÁ</span></div>`).join('');
        }

        async function add(p, b) {
            await fetch('/api/'+p, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)});
            load();
        }

        async function del(p, id) {
            await fetch(`/api/${p}/${id}`, {method:'DELETE'});
            load();
        }
    </script>
</body>
</html>
