<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BÈO ADMIN - DATABASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff0f3; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #eee; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .active { background: #fe2c55; color: white; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .list { height: 300px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .del { color: #fe2c55; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#fe2c55;">⚙️ QUẢN TRỊ DỮ LIỆU</h2>
        <div class="tabs">
            <div class="tab active" onclick="show('ban')">TỪ CẤM</div>
            <div class="tab" onclick="show('acr')">VIẾT TẮT</div>
            <div class="tab" onclick="show('emo')">ICON</div>
            <div class="tab" onclick="show('bot')">TRỢ LÝ</div>
        </div>

        <div id="sec-ban">
            <input type="text" id="i-ban" placeholder="Từ cấm...">
            <button onclick="add('words', {word: document.getElementById('i-ban').value})">THÊM</button>
            <div class="list" id="l-ban"></div>
        </div>

        <div id="sec-acr" style="display:none">
            <input type="text" id="i-acr-k" placeholder="Từ gốc (vd: k)">
            <input type="text" id="i-acr-v" placeholder="Dịch ra (vd: không)">
            <button onclick="add('acronyms', {key: document.getElementById('i-acr-k').value, value: document.getElementById('i-acr-v').value})">THÊM</button>
            <div class="list" id="l-acr"></div>
        </div>

        <div id="sec-emo" style="display:none">
            <input type="text" id="i-emo-i" placeholder="Icon Emoji">
            <input type="text" id="i-emo-t" placeholder="Cách đọc">
            <button onclick="add('emojis', {icon: document.getElementById('i-emo-i').value, text: document.getElementById('i-emo-t').value})">THÊM</button>
            <div class="list" id="l-emo"></div>
        </div>

        <div id="sec-bot" style="display:none">
            <input type="text" id="i-bot-k" placeholder="Từ khóa khách hỏi...">
            <input type="text" id="i-bot-r" placeholder="Câu trả lời của bot...">
            <button onclick="add('bot', {keyword: document.getElementById('i-bot-k').value, response: document.getElementById('i-bot-r').value})">THÊM</button>
            <div class="list" id="l-bot"></div>
        </div>
    </div>

    <script>
        function show(t) {
            ['ban','acr','emo','bot'].forEach(s => document.getElementById('sec-'+s).style.display = s===t?'block':'none');
            document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.innerText.toLowerCase().includes(t)));
        }
        async function load() {
            const b = await (await fetch('/api/words')).json();
            document.getElementById('l-ban').innerHTML = b.map(x => `<div class="item"><span>${x}</span><span class="del" onclick="del('words','${x}')">XOÁ</span></div>`).join('');
            const a = await (await fetch('/api/acronyms')).json();
            document.getElementById('l-acr').innerHTML = a.map(x => `<div class="item"><span>${x.key}➜${x.value}</span><span class="del" onclick="del('acronyms','${x.key}')">XOÁ</span></div>`).join('');
            const e = await (await fetch('/api/emojis')).json();
            document.getElementById('l-emo').innerHTML = e.map(x => `<div class="item"><span>${x.icon}➜${x.text}</span><span class="del" onclick="del('emojis','${x._id}')">XOÁ</span></div>`).join('');
            const o = await (await fetch('/api/bot')).json();
            document.getElementById('l-bot').innerHTML = o.map(x => `<div class="item"><span>${x.keyword}</span><span class="del" onclick="del('bot','${x._id}')">XOÁ</span></div>`).join('');
        }
        async function add(p, b) { await fetch('/api/'+p, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(b)}); load(); }
        async function del(p, id) { await fetch(`/api/${p}/${encodeURIComponent(id)}`, {method:'DELETE'}); load(); }
        load();
    </script>
</body>
</html>
